name: Keep Alive Render Backend

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes (Render sleeps after 15 mins)
  workflow_dispatch:      # Allows you to run it manually from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          # Replace the URL below with your actual Render backend URL
          curl -s https://portfolio2-0-q4d6.onrender.com/ > /dev/null
          echo "Server poked successfully at $(date)"
